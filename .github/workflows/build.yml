name: build

on:
  push:
    tags: ['v*', 'test*']

jobs:
  build_macos:
    name: Build for MacOS
    runs-on: macos-13
    steps:
    - name: "Checkout"
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: "Setup Go"
      uses: actions/setup-go@v5
      with:
        # Read the Go version from go.mod so CI auto-tracks the toolchain
        # whenever the module's go directive changes. Avoids the drift bug
        # where workflow said 1.17 but go.mod required 1.23.
        go-version-file: 'go.mod'
        # Explicit actions/cache step below handles module + build cache,
        # so disable setup-go's built-in cache to prevent double-caching.
        cache: false
    - name: Cache Go Modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: "Build"
      run: make build_macos
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: macos
        path: _output/macos/Assurcast Reader.app

  build_windows:
    name: Build for Windows
    runs-on: windows-2022
    steps:
    - name: "Checkout"
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: "Setup Go"
      uses: actions/setup-go@v5
      with:
        # Read the Go version from go.mod so CI auto-tracks the toolchain
        # whenever the module's go directive changes. Avoids the drift bug
        # where workflow said 1.17 but go.mod required 1.23.
        go-version-file: 'go.mod'
        # Explicit actions/cache step below handles module + build cache,
        # so disable setup-go's built-in cache to prevent double-caching.
        cache: false
    - name: Cache Go Modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: "Build"
      run: make build_windows
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: _output/windows/assurcast-reader.exe

  build_linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: "Setup Go"
      uses: actions/setup-go@v5
      with:
        # Read the Go version from go.mod so CI auto-tracks the toolchain
        # whenever the module's go directive changes. Avoids the drift bug
        # where workflow said 1.17 but go.mod required 1.23.
        go-version-file: 'go.mod'
        # Explicit actions/cache step below handles module + build cache,
        # so disable setup-go's built-in cache to prevent double-caching.
        cache: false
    - name: Cache Go Modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: "Build"
      run: make build_linux
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: _output/linux/assurcast-reader

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, 'test') }}
    needs: [build_macos, build_windows, build_linux]
    steps:
    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: false
    - name: Download Artifacts
      uses: actions/download-artifact@v4.1.7
      with:
        path: .
    - name: Preparation
      run: |
        ls -R
        chmod u+x "macos/Contents/MacOS/assurcast-reader"
        chmod u+x linux/assurcast-reader

        mv macos "Assurcast Reader.app" && zip -r assurcast-reader-macos.zip "Assurcast Reader.app"
        mv windows/assurcast-reader.exe . && zip assurcast-reader-windows.zip assurcast-reader.exe
        mv linux/assurcast-reader .      && zip assurcast-reader-linux.zip assurcast-reader
    - name: Upload MacOS
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./assurcast-reader-macos.zip
          asset_name: assurcast-reader-${{ github.ref }}-macos64.zip
          asset_content_type: application/zip
    - name: Upload Windows
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./assurcast-reader-windows.zip
          asset_name: assurcast-reader-${{ github.ref }}-windows64.zip
          asset_content_type: application/zip
    - name: Upload Linux
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./assurcast-reader-linux.zip
          asset_name: assurcast-reader-${{ github.ref }}-linux64.zip
          asset_content_type: application/zip
